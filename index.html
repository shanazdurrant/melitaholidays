<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melita Holidays</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
--gold:#e09a42;
--teal:#29787f;
--cream:#f6f4f2;
}

body {
margin:0;
font-family:'Poppins',sans-serif;
background:var(--teal);
color:white;
}

/* HERO */
.hero {
height:100vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero img {
width:70%;
max-width:700px;
}

/* LIGHT SECTION */
.section-light {
background:var(--cream);
color:#222;
padding:80px 20px;
text-align:center;
}

/* STATS */
.stats {
display:flex;
flex-wrap:wrap;
gap:20px;
padding:40px;
background:var(--teal);
}

.stat {
flex:1;
border:2px solid var(--gold);
padding:30px;
}

/* CARDS */
.card {
border:2px solid var(--gold);
padding:20px;
margin:10px;
}

/* FOOTER */
.footer {
background:#111;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<img src="logo.png">
</section>

<!-- FIND ESCAPE -->
<section class="section-light">
<h2 style="color:#e09a42;">Find Your Perfect Escape</h2>
<p>We help you find the perfect destination tailored to you.</p>
</section>

<!-- STATS -->
<div class="stats">
<div class="stat">200+<br>Suppliers</div>
<div class="stat">100%<br>Protected</div>
<div class="stat">100%<br>Personalised</div>
</div>

<!-- FORM -->
<section class="section-light">
<iframe src="https://form.jotform.com/243554201551347" width="100%" height="600"></iframe>
</section>

<!-- FOOTER -->
<div class="footer">
<p>Melita Holidays</p>
</div>

</body>
</html>
