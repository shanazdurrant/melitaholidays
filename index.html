<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melita Holidays</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

:root{
  --teal:#2f7f82;
  --teal-dark:#256c6f;
  --gold:#e09a42;
  --cream:#f6f4f2;
  --white:#ffffff;
  --text-dark:#2a2a2a;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Poppins',sans-serif;
  background:#fff;
  color:var(--text-dark);
  scroll-behavior:smooth;
}

/* \u2500\u2500 SECTION HEADING STYLE \u2500\u2500 */
.section-heading{
  text-align:center;
  margin-bottom:50px;
}
.section-heading h2{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(24px,3vw,36px);
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-dark);
  margin-bottom:14px;
}
.section-heading h2 span{color:var(--teal);}
.section-heading .heading-line{
  width:60px;
  height:4px;
  background:var(--gold);
  margin:0 auto 14px;
  border-radius:2px;
}
.section-heading p{
  font-size:15px;
  color:#666;
  max-width:600px;
  margin:0 auto;
  line-height:1.7;
}
/* On teal backgrounds */
.heading-light h2{color:#fff;}
.heading-light p{color:rgba(255,255,255,0.8);}

/* \u2500\u2500 SECTION DIVIDERS \u2500\u2500 */
.divider{
  height:6px;
  background:linear-gradient(90deg, var(--teal), var(--gold), var(--teal));
}
.divider-thin{
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  margin:0 60px;
}

/* \u2500\u2500 FADE \u2500\u2500 */
.fade{opacity:0;transform:translateY(30px);transition:opacity .9s ease,transform .9s ease;}
.fade.show{opacity:1;transform:translateY(0);}

/* \u2500\u2500 NAV \u2500\u2500 */
nav{
  position:sticky;
  top:0;
  z-index:100;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 40px;
  box-shadow:0 2px 16px rgba(0,0,0,0.1);
  border-bottom:3px solid var(--gold);
}
.nav-logo img{height:50px;object-fit:contain;}
.nav-links{
  display:flex;
  gap:30px;
  list-style:none;
}
.nav-links a{
  text-decoration:none;
  color:var(--text-dark);
  font-size:13px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:color .2s;
  position:relative;
}
.nav-links a::after{
  content:'';
  position:absolute;
  bottom:-4px;left:0;right:0;
  height:2px;
  background:var(--gold);
  transform:scaleX(0);
  transition:transform .2s;
}
.nav-links a:hover{color:var(--teal);}
.nav-links a:hover::after{transform:scaleX(1);}
.nav-cta{
  background:var(--teal);
  color:#fff!important;
  padding:11px 26px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  letter-spacing:.5px;
  transition:background .2s, transform .2s;
  box-shadow:0 4px 12px rgba(47,127,130,0.3);
}
.nav-cta:hover{background:var(--teal-dark);transform:translateY(-1px);}

/* \u2500\u2500 HERO \u2500\u2500 */
.hero{
  background:var(--teal);
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:90vh;
  align-items:center;
}
.hero-left{
  padding:80px 60px;
  color:#fff;
}
.hero-left img{
  width:260px;
  margin-bottom:30px;
  display:block;
}
.hero-left h1{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(26px,3.5vw,44px);
  font-weight:900;
  color:var(--gold);
  line-height:1.2;
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.hero-left .hero-sub{
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  font-weight:600;
  color:rgba(255,255,255,0.6);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:20px;
}
.hero-left p{
  font-size:15px;
  opacity:.9;
  margin-bottom:34px;
  max-width:420px;
  line-height:1.8;
}
.hero-btns{display:flex;flex-direction:column;gap:12px;max-width:300px;}
.btn-primary{
  display:block;
  padding:16px 28px;
  border-radius:50px;
  background:var(--gold);
  color:#fff;
  font-weight:700;
  font-size:14px;
  text-decoration:none;
  text-align:center;
  letter-spacing:.5px;
  transition:background .2s, transform .2s;
  box-shadow:0 4px 14px rgba(224,154,66,0.4);
}
.btn-primary:hover{background:#c8882e;transform:translateY(-2px);}
.btn-outline{
  display:block;
  padding:15px 28px;
  border-radius:50px;
  border:2px solid rgba(255,255,255,0.5);
  color:#fff;
  font-weight:600;
  font-size:14px;
  text-decoration:none;
  text-align:center;
  transition:all .2s;
}
.btn-outline:hover{border-color:#fff;background:rgba(255,255,255,0.1);}

/* hero image mosaic */
.hero-right{
  height:100%;
  min-height:90vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:4px;
  overflow:hidden;
}
.hero-right img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.hero-right img:first-child{grid-row:1/3;}

/* \u2500\u2500 EXPLORE BAND \u2500\u2500 */
.explore-band{
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px 60px;
  gap:30px;
  flex-wrap:wrap;
}
.explore-band h2{
  font-family:'Montserrat',sans-serif;
  font-size:16px;
  font-weight:900;
  color:var(--teal);
  letter-spacing:2px;
  text-transform:uppercase;
}
.explore-checks{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  font-size:13px;
  color:#555;
}
.explore-checks span{display:flex;align-items:center;gap:6px;}
.explore-checks span::before{content:'\u2714';color:var(--teal);font-weight:700;font-size:12px;}
.explore-atol img{height:55px;object-fit:contain;}

/* \u2500\u2500 STATS \u2500\u2500 */
.stats{
  background:var(--teal);
  color:#fff;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  text-align:center;
  padding:60px 40px;
  gap:20px;
}
.stats > div{border-right:1px solid rgba(255,255,255,0.15);}
.stats > div:last-child{border-right:none;}
.stat-num{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(40px,5vw,68px);
  font-weight:900;
  color:var(--gold);
  line-height:1;
}
.stat-label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:2px;
  opacity:.75;
  margin-top:8px;
}

/* \u2500\u2500 MOSAIC GALLERY \u2500\u2500 */
.gallery{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:240px 240px;
  gap:4px;
}
.gallery img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.gallery img:hover{transform:scale(1.03);}
.gallery img:first-child{grid-column:1/3;grid-row:1/3;}

/* \u2500\u2500 HOW IT WORKS \u2500\u2500 */
.how{
  background:var(--cream);
  padding:90px 60px;
  text-align:center;
}
.steps-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
  max-width:960px;
  margin:0 auto;
}
.step-card{
  background:#fff;
  padding:32px 20px;
  border-radius:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.07);
  border-top:4px solid var(--gold);
  transition:transform .2s, box-shadow .2s;
}
.step-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,0.1);}
.step-num{
  font-family:'Montserrat',sans-serif;
  font-size:42px;
  font-weight:900;
  color:var(--teal);
  opacity:.12;
  line-height:1;
  margin-bottom:4px;
}
.step-card i{
  font-size:28px;
  color:var(--teal);
  margin-bottom:14px;
  display:block;
}
.step-card h3{
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:10px;
  color:var(--text-dark);
}
.step-card p{font-size:13px;color:#777;line-height:1.6;}

/* \u2500\u2500 WHY BOOK \u2500\u2500 */
.why{
  padding:90px 60px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:70px;
  align-items:center;
  background:#fff;
}
.why-img img{
  width:100%;
  border-radius:14px;
  object-fit:cover;
  height:520px;
  box-shadow:0 12px 40px rgba(0,0,0,0.12);
}
.why-content h2{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(22px,2.5vw,32px);
  font-weight:900;
  color:var(--text-dark);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.why-content .heading-line{width:50px;height:4px;background:var(--gold);border-radius:2px;margin-bottom:28px;}
.why-item{
  display:flex;
  gap:16px;
  margin-bottom:26px;
  align-items:flex-start;
  padding-bottom:26px;
  border-bottom:1px solid #eee;
}
.why-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.why-icon{font-size:24px;margin-top:2px;flex-shrink:0;}
.why-item h3{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.why-item p{font-size:13px;color:#666;line-height:1.6;}

/* \u2500\u2500 PLAN SECTION \u2500\u2500 */
.plan-section{background:var(--teal);color:#fff;}
.plan-hero{position:relative;height:420px;overflow:hidden;}
.plan-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.plan-hero-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;
}
.plan-hero-overlay h2{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(28px,4vw,52px);
  font-weight:900;
  color:#fff;
  text-align:center;
  letter-spacing:3px;
  text-transform:uppercase;
}
.plan-hero-overlay .gold-line{width:70px;height:4px;background:var(--gold);border-radius:2px;}
.plan-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;}
.plan-card{
  padding:48px 50px;
  border-top:1px solid rgba(255,255,255,0.12);
  border-right:1px solid rgba(255,255,255,0.12);
}
.plan-card:nth-child(even){border-right:none;}
.plan-card h3{
  font-family:'Montserrat',sans-serif;
  font-size:14px;
  font-weight:800;
  color:var(--gold);
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.plan-card p{font-size:14px;opacity:.82;line-height:1.75;}

/* \u2500\u2500 EXPERIENCE \u2500\u2500 */
.experience{padding:90px 60px;background:#fff;}
.exp-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}
.exp-card{
  border-radius:14px;
  overflow:hidden;
  position:relative;
  height:300px;
  cursor:pointer;
  box-shadow:0 6px 24px rgba(0,0,0,0.1);
}
.exp-card img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .5s;
  display:block;
}
.exp-card:hover img{transform:scale(1.07);}
.exp-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.1) 55%);
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:22px;
  color:#fff;
}
.exp-overlay h3{
  font-family:'Montserrat',sans-serif;
  font-size:13px;font-weight:900;
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:6px;
}
.exp-overlay .exp-tag{
  font-size:11px;
  background:var(--gold);
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  font-weight:600;
  margin-bottom:8px;
  letter-spacing:.5px;
}
.exp-overlay p{
  font-size:12px;opacity:0;
  line-height:1.5;
  transition:opacity .35s ease, max-height .35s ease;
  max-height:0;overflow:hidden;
}
.exp-card:hover .exp-overlay p{opacity:.9;max-height:60px;}

/* \u2500\u2500 REVIEWS (FLIP CARDS) \u2500\u2500 */
.reviews{
  background:var(--cream);
  padding:90px 60px;
}
.review-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
}
.review-card{
  perspective:1000px;
  height:420px;
  cursor:pointer;
}
.review-inner{
  position:relative;
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .75s cubic-bezier(.4,0,.2,1);
}
.review-card:hover .review-inner{transform:rotateY(180deg);}
.review-front,.review-back{
  position:absolute;
  width:100%;height:100%;
  backface-visibility:hidden;
  border-radius:14px;
  overflow:hidden;
}
.review-front{
  background-size:cover;
  background-position:center;
}
.review-front .overlay{
  position:absolute;
